<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Link Opener</title>

<style>
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-2: #111827;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --border: #334155;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 40px 15px;
}

.app {
  width: 900px;
  max-width: 100%;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 600;
}

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

textarea {
  width: 100%;
  min-height: 180px;
  resize: vertical;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border .2s;
}

textarea:focus {
  border-color: var(--accent);
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
  font-size: 14px;
  color: var(--muted);
}

.stats strong {
  color: var(--accent);
}

.progress-bar-container {
  height: 8px;
  background: var(--panel-2);
  border-radius: 6px;
  margin-top: 12px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width .2s ease;
}

.buttons {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  flex-wrap: wrap;
}

button {
  flex: 1;
  min-width: 150px;
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s ease;
}

.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary {
  background: #475569;
  color: white;
}
.btn-secondary:hover { background: #334155; }

.btn-danger {
  background: var(--danger);
  color: white;
}
.btn-danger:hover { background: var(--danger-hover); }

.footer-note {
  margin-top: 15px;
  font-size: 12px;
  color: var(--muted);
  text-align: right;
}
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>Multi Link Opener</h1>
  </div>

  <div class="card">
    <textarea id="links"
      placeholder="https://app.webpt.com/patientChart.php?ID="></textarea>

    <div class="stats">
      <div>Válidos: <strong id="count">0</strong></div>
      <div>Progreso: <strong id="progress">0 / 0</strong></div>
    </div>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="buttons">
      <button class="btn-primary" onclick="openLinks()">Modo Lotes</button>
      <button class="btn-secondary" onclick="openSequential()">Secuencial 1.5s</button>
      <button class="btn-danger" onclick="stopOpening()">Detener</button>
      <button class="btn-secondary" onclick="clearAll()">Limpiar</button>
    </div>

    <div class="footer-note">
      Límite máximo: 50 enlaces
    </div>
  </div>

</div>

<script>
const textarea = document.getElementById("links");
const counter = document.getElementById("count");
const progress = document.getElementById("progress");
const progressBar = document.getElementById("progressBar");

const MAX_LINKS = 50;
const DELAY_MS = 1;
const BATCH_SIZE = 0;
const BATCH_PAUSE_MS = 1;
const SEQUENTIAL_DELAY_MS = 1800;

let shouldStop = false;

textarea.addEventListener("input", updateCount);

function getRawUrls() {
  return textarea.value
    .split("\n")
    .map(u => u.trim())
    .filter(u => u.length > 0);
}

function normalizeUrl(url) {
  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }
  return url;
}

function isValidUrl(url) {
  try { new URL(url); return true; }
  catch { return false; }
}

function getValidUrls() {
  return getRawUrls()
    .map(normalizeUrl)
    .filter(isValidUrl);
}

function updateCount() {
  counter.textContent = getValidUrls().length;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function updateProgress(opened, total) {
  progress.textContent = `${opened} / ${total}`;
  const percent = total === 0 ? 0 : (opened / total) * 100;
  progressBar.style.width = percent + "%";
}

async function openLinks() {
  shouldStop = false;
  const urls = getValidUrls();
  const total = urls.length;

  if (total === 0 || total > MAX_LINKS) return;

  let opened = 0;
  updateProgress(0, total);

  for (let i = 0; i < total; i++) {
    if (shouldStop) break;

    window.open(urls[i], "_blank");
    opened++;
    updateProgress(opened, total);

    await sleep(DELAY_MS);

    if (opened % BATCH_SIZE === 0 && opened < total) {
      await sleep(BATCH_PAUSE_MS);
    }
  }
}

async function openSequential() {
  shouldStop = false;
  const urls = getValidUrls();
  const total = urls.length;

  if (total === 0 || total > MAX_LINKS) return;

  let opened = 0;
  updateProgress(0, total);

  for (let i = 0; i < total; i++) {
    if (shouldStop) break;

    window.open(urls[i], "singleTabWindow");
    opened++;
    updateProgress(opened, total);

    await sleep(SEQUENTIAL_DELAY_MS);
  }
}

function stopOpening() {
  shouldStop = true;
}

function clearAll() {
  textarea.value = "";
  updateProgress(0, 0);
  updateCount();
}

updateCount();
</script>

</body>
</html>
