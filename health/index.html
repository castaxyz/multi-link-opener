<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Check</title>

    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --panel-2: #111827;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: #334155;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: system-ui, sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 15px;
        }

        .app {
            width: 500px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
        }

        .status {
            margin: 15px 0;
            padding: 12px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--success);
            border-radius: 10px;
            color: var(--success);
            font-weight: 500;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .footer {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="card">
            <h2>Health Check</h2>

            <div class="status">
                ✔ Service Status: OK
            </div>

            <input type="text" placeholder="Test input (simulado)">
            <button onclick="check()">Run Check</button>

            <div class="footer">
                Endpoint /health funcionando correctamente
            </div>
        </div>
    </div>

    <script>
        function check() {
            alert("Health OK");
        }
    </script>

</body>

</html>
